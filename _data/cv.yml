    Experience:
      - company: University of Tsukuba, CGG Lab
        position: Doctoral Research, Computer Graphics and Vision
        location: Tsukuba, Japan
        start_date: 2024-04
        end_date: present
        summary: Research digital human editing with 3D Gaussian Splatting, focusing on outfit personalization, cross-avatar editing, and animatable avatar control.
        highlights:
          - Design and implement a multi-stage 3D avatar editing system in PyTorch, combining mesh-based geometric optimization, self-supervised data generation, and diffusion-based refinement for high-fidelity free-viewpoint editing.
          - Prototype feed-forward, animatable, and editable Gaussian avatars for body-shape control and outfit personalization.
          - Build supporting tooling for GPU-cluster experimentation and data processing on Linux servers, improving reproducibility and day-to-day research workflow.

      - company: University of Tsukuba, CGG Lab
        position: Master's Research, Computer Graphics and Vision
        location: Tsukuba, Japan
        start_date: 2022-04
        end_date: 2024-03
        summary: Researched sparse-view digital human reconstruction and rendering, with a focus on generalizable human NeRF models that balance rendering quality and inference efficiency.
        highlights:
          - Designed and implemented a human-prior-guided rendering pipeline in PyTorch, integrating geometry-aware guidance and occlusion-aware refinement for high-quality novel-view synthesis from only 3 to 4 input images.

      - company: Industry-Academia Research Collaboration
        position: Rendering Research Contributor
        location: Japan
        start_date: 2025
        end_date: present
        summary: Collaborative research project with an industry partner.
        highlights:
          - Contributed to a product-oriented face rendering and inverse rendering research project, focusing on practical modeling and analysis for facial geometry and appearance.

