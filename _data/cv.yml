      - company: University of Tsukuba, CGG Lab
        position: Doctoral Researcher
        start_date: 2024-04
        end_date: present
        location: Tsukuba, Japan
        highlights:
          - Research digital human reconstruction and editing with **3D Gaussian Splatting**, **NeRF**, and mesh-based deformation models, focusing on animatable avatars and outfit personalization.
          - Design and implement training and inference pipelines in **PyTorch**, including multi-view rendering, geometry-aware losses, and sparse-view human avatar experiments.
          - Prototype deformation backbones for dynamic avatars, including **Point Transformer**-based vertex deformation and Gaussian-on-mesh representations for pose-driven animation.
          - Build supporting tooling for Linux GPU-cluster experimentation and data processing to improve reproducibility and day-to-day research workflow.

      - company: University of Tsukuba, CGG Lab
        position: Master's Researcher
        start_date: 2022-04
        end_date: 2024-03
        location: Tsukuba, Japan
        highlights:
          - Studied sparse-view digital human reconstruction and developed a generalizable human avatar method with improved visual quality and cross-view consistency from only a few input images.
          - Worked extensively with differentiable rendering, human priors, and multi-view geometry for neural scene representation.

      - company: Collaborative Research Project
        position: Research Contributor in Face Rendering
        start_date: 2025
        end_date: present
        location: Japan
        highlights:
          - Contributed to a product-oriented face rendering and inverse rendering research effort, focusing on practical modeling and analysis pipelines for facial appearance.

